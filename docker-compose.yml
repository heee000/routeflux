services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: routeflux
      POSTGRES_PASSWORD: routeflux
      POSTGRES_DB: routeflux
    ports:
      - "5432:5432"
    volumes:
      - routeflux-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routeflux"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - routeflux-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  routeflux-postgres:
  routeflux-redis:
